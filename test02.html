<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>안녕하세요</h1>
    <script>
        // var(가변형) , let(불변형) , const(고정형) 
        var a = 100
        var b = 'a'
        ch = "hello"    // var 형
        document.writeln(a,"<br>")
        document.writeln(b+"<br>")
        document.write(ch)
        document.write("<br>")
        document.write(a + 100 + b)
        document.write("<br>")
        document.write(a,100,b)
        document.write("<br>")
        document.write(b+a+100)
        document.write("<br>")
        d = '1000'
        document.write(a+d+"<br>")
        document.write(a+Number(d)+"<br>")

    </script>
</body>
</html>
