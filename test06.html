<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        ar = [1,'a',"asdf","<img src=1.png>"] // 리스트
        document.write(ar)
        document.write("<br><br>")

        for(i=0;i<4;i++){
            document.write(ar[i],"<br>")
        }
        document.write("<br><br>")
        for(x in ar){
            document.write(ar[x],"<br>")
        }
    </script>
</body>
</html>
