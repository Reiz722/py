<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        sudo = ["서울","대전","대구","부산"]
        document.write(sudo + "<br>")
        sudo.push("제주도")
        document.write(sudo + "<br>")
        sudo[2] = "경주"
        document.write(sudo + "<br>")
        sudo.unshift("평양")
        document.write(sudo + "<br>")
        sudo.shift()
        document.write(sudo + "<br>")

        
    </script>
</body>
</html>
