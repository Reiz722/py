<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .ip{
        text-align: right;
        font-size: 80px;
        color: red;
        width: 290px;
    }
    .btn{
        width: 70px;
        height: 70px;
        font-size: 60px;
        border-radius: 100%;
        border: 0px;
    }
    .btn:hover{
        background-color: aqua;
    }
    .btn2{
        width: 140px;
        height: 70px;
        font-size: 50px;
        border-radius: 25px;
    }
    .btn2:hover{
        background-color: red;
    }
</style>
<body>
    <table bgcolor="red">
        <tr>
            <td colspan="4"><input type="text" id="input2"></td>
            
        </tr>
        <tr>
            <td colspan="4"><input type="text" id="inputbox" class="ip"></td>
        </tr>
        <tr>
            <td><button type="button" onclick="on(7)" class="btn">7</button></td>
            <td><button type="button" onclick="on(8)" class="btn">8</button></td>
            <td><button type="button" onclick="on(9)" class="btn">9</button></td>
            <td><button type="button" onclick="on('+')" class="btn">+</button></td>
        </tr>
        <tr>
            <td><button type="button" onclick="on(4)" class="btn">4</button></td>
            <td><button type="button" onclick="on(5)" class="btn">5</button></td>
            <td><button type="button" onclick="on(6)" class="btn">6</button></td>
            <td><button type="button" onclick="on('-')" class="btn">-</button></td>
        </tr>
        <tr>
            <td><button type="button" onclick="on(1)" class="btn">1</button></td>
            <td><button type="button" onclick="on(2)" class="btn">2</button></td>
            <td><button type="button" onclick="on(3)" class="btn">3</button></td>
            <td><button type="button" onclick="on('/')" class="btn">/</button></td>
        </tr>
        <tr>
            <td><button type="button" onclick="on(0)" class="btn">0</button></td>
            <td colspan="2"><button type="button" onclick="sum()" class="btn2">계산</button></td>
            <td><button type="button" onclick="on('*')" class="btn">*</button></td>
        </tr>
    </table>
    <script>
        input = document.getElementById("inputbox")
        input2 = document.getElementById("input2")
        ar=[]
        br=[]
        function on(x){
            ar.push(x)
            input.value = ar.join("")
        }
        function sum(){
            input2.value = ar.join("")
            input.value = eval(input.value)
            ar=[]
        }
    </script>
</body>
</html>
